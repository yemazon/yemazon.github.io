about_content: | # this will include new lines to allow paragraphs
  Senior Software Engineer with 8+ years of experience building **production-grade AI and backend systems**.

  I specialize in:
  - LLM-powered product systems
  - Applied ML in production
  - Streaming AI APIs and async architectures
  - Evaluation and monitoring pipelines
  - Multi-language AI generation systems
  - Cost and latency optimization for large-scale inference

  My recent work focuses on designing and scaling AI messaging platforms that generate, refine, and evaluate high-quality outreach content with measurable business impact.

  Engineering principles:
  - Quality must be measurable
  - Latency and cost are product features
  - Structured outputs reduce downstream complexity
  - Production AI is a systems engineering challenge, not just a modeling task

